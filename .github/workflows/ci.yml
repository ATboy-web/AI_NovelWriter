name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Python后端测试
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        cd ai-novel-writer/backend/ai-service
        pip install -r requirements.txt
        cd ../../novel-service
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd ai-novel-writer
        python -m pytest tests/ -v --tb=short || echo "No tests found"

  # React前端构建
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ai-novel-writer/frontend-react/package-lock.json
    
    - name: Install dependencies
      run: |
        cd ai-novel-writer/frontend-react
        npm ci
    
    - name: Build
      run: |
        cd ai-novel-writer/frontend-react
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: ai-novel-writer/frontend-react/dist/

  # Docker构建
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build AI Service Image
      run: |
        cd ai-novel-writer/backend/ai-service
        docker build -t ai-novel-writer/ai-service:${{ github.sha }} .
    
    - name: Build Novel Service Image
      run: |
        cd ai-novel-writer/backend/novel-service
        docker build -t ai-novel-writer/novel-service:${{ github.sha }} .

  # 发布Release (仅在main分支push时)
  release:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for version tag
      id: check_tag
      run: |
        if git describe --tags --exact-match 2>/dev/null; then
          echo "tag=$(git describe --tags --exact-match)" >> $GITHUB_OUTPUT
          echo "has_tag=true" >> $GITHUB_OUTPUT
        else
          echo "has_tag=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      if: steps.check_tag.outputs.has_tag == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ai-novel-writer/frontend-react/dist/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
