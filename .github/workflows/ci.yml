# ============================================================
# AI_NovelWriter CI/CD Pipeline
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: 代码质量检查
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Check Python syntax
      run: |
        echo "Checking Python syntax..."
        python -m py_compile novel_app.py
        python -m py_compile app/__init__.py
        python -m py_compile app/ai_client.py
        python -m py_compile app/novel_agent.py
        python -m py_compile app/memory_manager.py
        python -m py_compile app/scene_detector.py
        python -m py_compile app/navigation.py
        python -m py_compile app/agent_orchestrator.py
        echo "All Python syntax checks passed!"

  # Job 2: Python后端测试
  test-backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install httpx pytest
        echo "Dependencies installed successfully"
    
    - name: Run unit tests
      run: |
        if [ -d "tests" ]; then
          python -m pytest tests/ -v --tb=short
        else
          echo "No tests directory found, skipping"
        fi

  # Job 3: 构建检查
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test-backend
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Check imports
      run: |
        python -c "from app.ai_client import AIClient, PromptManager; print('AI Client OK')"
        python -c "from app.novel_agent import NovelAgent; print('Novel Agent OK')"
        python -c "from app.scene_detector import SceneDetector; print('Scene Detector OK')"
